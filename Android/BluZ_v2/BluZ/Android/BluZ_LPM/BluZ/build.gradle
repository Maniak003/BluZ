// Читает значение из local.properties (вне git). Используется для секретов:
// MAPKIT_API_KEY и параметров подписи (KEYSTORE_*). Если файла нет — вернёт default.
private String getLocalProperty(String key, String defaultValue) {
    def properties = new Properties()
    def f = rootProject.file("local.properties")
    if (f.exists()) {
        f.withInputStream { properties.load(it) }
    }
    return properties.getProperty(key, defaultValue)
}

private String getMapkitApiKey() {
    return getLocalProperty("MAPKIT_API_KEY", "")
}


android {
    signingConfigs {
        BluZ {
            def keystorePath = getLocalProperty("KEYSTORE_FILE", "")

            // ⬇️ ДОБАВЬТЕ ЭТИ СТРОКИ ДЛЯ ОТЛАДКИ ⬇️
            println "=== DEBUG SIGNING CONFIG ==="
            println "KEYSTORE_FILE from local.properties: '${keystorePath}'"
            println "File exists? ${keystorePath ? file(keystorePath).exists() : 'path is empty'}"
            // ⬆️ КОНЕЦ ОТЛАДКИ ⬆️

            if (keystorePath) {
                storeFile file(keystorePath)
                storePassword getLocalProperty("KEYSTORE_PASSWORD", "")
                keyAlias getLocalProperty("KEY_ALIAS", "")
                keyPassword getLocalProperty("KEY_PASSWORD", "")
            }
        }
    }
    packagingOptions {
        resources {
            excludes += ['res/**/*.arb']
        }
        jniLibs {
            useLegacyPackaging false
        }
        exclude "dump_syms/**"
    }
    namespace 'ru.starline.bluz'
    compileSdk 36
    buildFeatures {
        buildConfig = true
    }
    def mapkitApiKey = getMapkitApiKey()
    defaultConfig {
        applicationId "ru.starline.bluz"
        minSdk 27
        targetSdk 36
        versionCode 12
        versionName '1.12'
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        buildConfigField "String", "MAPKIT_API_KEY", "\"${mapkitApiKey}\""
        resourceConfigurations += ['ru', 'en']
    }

    buildTypes {
        release {
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            signingConfig signingConfigs.BluZ
            debuggable false
        }
        releaseTest {
            minifyEnabled false
            shrinkResources false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            signingConfig signingConfigs.debug
            debuggable true
        }
        //debuggableRelease.initWith(release)
        debug {
            minifyEnabled false
            debuggable true // только для отладки
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_21
        targetCompatibility JavaVersion.VERSION_21
    }

    kotlinOptions {
        jvmTarget = '21'
    }

    buildToolsVersion '36.0.0'
    ndkVersion '29.0.13846066 rc3'
    //buildToolsVersion '35.0.0 rc2'
    splits {
        abi {
            reset()
            include 'arm64-v8a' // Оставь только нужные
            //include 'arm64-v8a', 'armeabi-v7a' // Оставь только нужные
            // exclude 'x86', 'x86_64' — не нужны для реальных устройств
            universalApk false // не генерировать "универсальный" APK
        }
    }
    configurations {
        [
                "implementation",
                "api",
                "compileOnly",
                "runtimeOnly",
                "debugImplementation",
                "releaseImplementation"
        ].each { name ->
            getByName(name) {
                exclude group: 'com.intellij', module: 'annotations'
                exclude group: 'com.google.guava', module: 'listenablefuture'
            }
        }
    }


    //kapt {
    //    arguments {
    //        arg("room.schemaLocation", "$projectDir/schemas".toString())
    //        arg("room.incremental", "true")
    //        arg("room.expandProjection", "true")
    //    }
    //}
}

