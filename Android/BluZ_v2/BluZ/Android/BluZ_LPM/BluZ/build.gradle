// Dokka — генерация документации из KDoc:
//   ./gradlew :BluZ:dokkaHtml   →  BluZ/build/dokka/html/
//   ./gradlew :BluZ:dokkaGfm    →  BluZ/build/dokka/gfm/  (markdown)
dokkaHtml {
    outputDirectory.set(file("$buildDir/dokka/html"))
    dokkaSourceSets.configureEach {
        moduleName.set("BluZ")
        includeNonPublic.set(false)
        skipEmptyPackages.set(true)
        skipDeprecated.set(false)
        reportUndocumented.set(false)
    }
}

ext {
    mapkitApiKey = getMapkitApiKey()
}

